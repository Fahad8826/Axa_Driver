name: axa_driver
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+6

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  get: ^4.7.3
  flutter_secure_storage: ^9.2.2
  dio: ^5.9.2
  google_fonts: ^8.0.2
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.0
  firebase_core: ^4.6.0 
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.2.1
  flutter_background_service: ^5.0.5
  geolocator: ^13.0.1
  web_socket_channel: ^3.0.1
  permission_handler: ^12.0.1
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^3.0.0
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
 

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/applogo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/applogo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/svgs/
    